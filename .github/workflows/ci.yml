name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@latest

      - name: Validate Kubernetes manifests
        run: $(go env GOPATH)/bin/kubeconform -strict -summary deploy/kubernetes/manifests.yaml

      - name: Run smoke e2e tests
        run: go test -v -timeout=30m -tags=e2e ./test/e2e/...
