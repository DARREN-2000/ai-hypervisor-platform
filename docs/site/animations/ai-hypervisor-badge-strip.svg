<svg width="1600" height="220" viewBox="0 0 1600 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Hypervisor Platform badge strip</title>
  <desc id="desc">Dark animated badge strip for the README header showing the API, scheduler, worker, and observability layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040912" />
      <stop offset="1" stop-color="#0A1728" />
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="32" x2="1480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8AF0CF" />
      <stop offset="0.5" stop-color="#8FB1FF" />
      <stop offset="1" stop-color="#FFB06A" />
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1600" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <rect width="1600" height="220" rx="32" fill="url(#bg)" />
  <rect x="28" y="28" width="1544" height="164" rx="24" fill="#07111F" stroke="rgba(255,255,255,0.08)" />
  <path d="M64 110H1536" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 18" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;160" dur="5s" repeatCount="indefinite" />
  </path>

  <g>
    <g transform="translate(80 56)">
      <rect width="290" height="108" rx="24" fill="#0E1B2E" stroke="rgba(138,240,207,0.22)" />
      <circle cx="48" cy="54" r="16" fill="#8AF0CF" />
      <circle cx="48" cy="54" r="28" fill="none" stroke="rgba(138,240,207,0.4)" stroke-width="2">
        <animate attributeName="r" values="24;32;24" dur="3s" repeatCount="indefinite" />
      </circle>
      <text x="82" y="49" fill="#ECF3FF" font-family="Space Grotesk, IBM Plex Sans, sans-serif" font-size="24" font-weight="700">API</text>
      <text x="82" y="78" fill="#9FB2D2" font-family="IBM Plex Sans, sans-serif" font-size="14">Gateway and health</text>
    </g>

    <g transform="translate(430 56)">
      <rect width="290" height="108" rx="24" fill="#10192A" stroke="rgba(143,177,255,0.22)" />
      <circle cx="48" cy="54" r="16" fill="#8FB1FF" />
      <circle cx="48" cy="54" r="28" fill="none" stroke="rgba(143,177,255,0.4)" stroke-width="2">
        <animate attributeName="r" values="24;32;24" dur="3.4s" repeatCount="indefinite" />
      </circle>
      <text x="82" y="49" fill="#ECF3FF" font-family="Space Grotesk, IBM Plex Sans, sans-serif" font-size="24" font-weight="700">SCHED</text>
      <text x="82" y="78" fill="#9FB2D2" font-family="IBM Plex Sans, sans-serif" font-size="14">Placement and scoring</text>
    </g>

    <g transform="translate(780 56)">
      <rect width="290" height="108" rx="24" fill="#101E21" stroke="rgba(255,176,106,0.22)" />
      <circle cx="48" cy="54" r="16" fill="#FFB06A" />
      <circle cx="48" cy="54" r="28" fill="none" stroke="rgba(255,176,106,0.4)" stroke-width="2">
        <animate attributeName="r" values="24;32;24" dur="3.7s" repeatCount="indefinite" />
      </circle>
      <text x="82" y="49" fill="#ECF3FF" font-family="Space Grotesk, IBM Plex Sans, sans-serif" font-size="24" font-weight="700">WORKER</text>
      <text x="82" y="78" fill="#9FB2D2" font-family="IBM Plex Sans, sans-serif" font-size="14">Async tasks and jobs</text>
    </g>

    <g transform="translate(1130 56)">
      <rect width="290" height="108" rx="24" fill="#0D1726" stroke="rgba(255,255,255,0.16)" />
      <circle cx="48" cy="54" r="16" fill="#F3F7FF" />
      <circle cx="48" cy="54" r="28" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2">
        <animate attributeName="r" values="24;32;24" dur="4s" repeatCount="indefinite" />
      </circle>
      <text x="82" y="49" fill="#ECF3FF" font-family="Space Grotesk, IBM Plex Sans, sans-serif" font-size="24" font-weight="700">OBS</text>
      <text x="82" y="78" fill="#9FB2D2" font-family="IBM Plex Sans, sans-serif" font-size="14">Metrics and traces</text>
    </g>
  </g>
</svg>