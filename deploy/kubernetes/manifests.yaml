                    operator: In
                    values:
                      - "true"
      containers:
        - name: gpu-orchestrator
          image: aihypervisor/gpu-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 5001
            - name: metrics
              containerPort: 8081
          env:
            - name: AIHYPERVISOR_CONFIG
              value: "/etc/aihypervisor/config.yaml"
            - name: DATABASE_PASSWORD
