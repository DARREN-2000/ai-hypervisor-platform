    metadata:
      labels:
        app: resource-monitor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: resource-monitor
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: aihypervisor/control-plane
                    operator: In
                    values:
                      - "true"
      containers:
        - name: resource-monitor
          image: aihypervisor/resource-monitor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8081
          env:
            - name: AIHYPERVISOR_CONFIG
              value: "/etc/aihypervisor/config.yaml"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: database-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: redis-password
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: nats-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
