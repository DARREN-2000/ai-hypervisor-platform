---
# AI Hypervisor Platform - Kubernetes Deployment Manifests
# This file contains the complete Kubernetes deployment for the AI Hypervisor Platform
# Deploy with: kubectl apply -f deploy/kubernetes/manifests.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: aihypervisor
  labels:
    name: aihypervisor

---
apiVersion: v1
kind: Namespace
metadata:
  name: aihypervisor-agents
  labels:
    name: aihypervisor-agents

---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-workloads
  labels:
    name: ai-workloads

---
# Storage Class for persistent volumes
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: aihypervisor-fast
provisioner: kubernetes.io/local
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: ssd

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: aihypervisor-config
  namespace: aihypervisor
data:
  config.yaml: |
    api_server:
      address: "0.0.0.0"
      port: 8080
      read_timeout: 15s
      write_timeout: 15s
      idle_timeout: 60s
      max_header_bytes: 1048576
      metrics:
        enabled: true
        prometheus_addr: "0.0.0.0"
        prometheus_port: 8081
        scrape_interval: 30s
        retention_days: 30
    
    vm_manager:
      max_concurrent_provisioning: 10
      provisioning_timeout: 5m
      state_check_interval: 30s
      heartbeat_interval: 30s
    
    scheduler:
      algorithm: "bin-packing"
      scheduling_timeout: 10s
      allow_overcommit: false
      overcommit_ratio: 1.0
      max_vms_per_node: 100
    
    gpu_orchestrator:
      allocation_policy: "bin-packing"
      allow_sharing: false
      max_vms_per_gpu: 1
      prefer_dedicated_gpus: true
      enable_mig: false
      health_check_interval: 30s
      gpu_metrics_interval: 10s
    
    task_executor:
      max_concurrent_tasks: 20
      max_retries: 3
      initial_backoff: 1s
      max_backoff: 5m
      task_timeout: 10m
    
    resource_monitor:
      metrics_interval: 10s
      metrics_retention_days: 30
      prediction_window: 5m
      alert_thresholds:
        cpu_utilization: 80
        memory_utilization: 85
        disk_utilization: 90
        gpu_utilization: 90
        gpu_temperature: 80
    
    database:
      host: "postgres.infra.svc.cluster.local"
      port: 5432
      database: "aihypervisor"
      ssl_mode: "require"
      max_connections: 100
      connect_timeout: 10s
      idle_timeout: 5m
      max_idle_conns: 25
    
    redis:
      host: "redis.infra.svc.cluster.local"
      port: 6379
      pool_size: 50
      connect_timeout: 5s
      read_timeout: 3s
      write_timeout: 3s
    
    nats:
      urls:
        - "nats://nats.infra.svc.cluster.local:4222"
      connect_timeout: 5s
      max_reconnect: 10
      reconnect_wait: 2s
    
    logging:
      level: "info"
      format: "json"
      output_path: "stdout"
    
    libvirt:
      uri: "qemu:///system"
      connection_timeout: 10s
      max_connections: 10
    
    kubernetes:
      enabled: true
      in_cluster: true
      namespace: "aihypervisor"
    
    security:
      tls_enabled: true
      mutual_tls_enabled: true
      rbac_enabled: true
      audit_enabled: true

---
# API Server Service
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: aihypervisor
  labels:
    app: api-server
spec:
  type: LoadBalancer
  ports:
    - name: api
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: api-server

---
# API Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: aihypervisor
  labels:
    app: api-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: api-server
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api-server
          image: ghcr.io/DARREN-2000/ai-hypervisor-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 8080
            - name: metrics
              containerPort: 8081
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: AIHYPERVISOR_CONFIG
              value: "/etc/aihypervisor/config.yaml"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /etc/aihypervisor
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: aihypervisor-config

---
# VM Manager Service
apiVersion: v1
kind: Service
metadata:
  name: vm-manager
  namespace: aihypervisor
  labels:
    app: vm-manager
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 5000
      targetPort: 5000
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: vm-manager

---
# VM Manager StatefulSet (single replica for state consistency)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vm-manager
  namespace: aihypervisor
  labels:
    app: vm-manager
spec:
  serviceName: vm-manager
  replicas: 1
  selector:
    matchLabels:
      app: vm-manager
  template:
    metadata:
      labels:
        app: vm-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: vm-manager
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: aihypervisor/control-plane
                    operator: In
                    values:
                      - "true"
      containers:
        - name: vm-manager
          image: aihypervisor/vm-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 5000
            - name: metrics
              containerPort: 8081
          env:
            - name: AIHYPERVISOR_CONFIG
              value: "/etc/aihypervisor/config.yaml"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: database-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: redis-password
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: nats-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: jwt-secret
          volumeMounts:
            - name: config
              mountPath: /etc/aihypervisor
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "echo '' | nc localhost 5000"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "echo \'\' | nc localhost 5000"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: aihypervisor-config

---
# GPU Orchestrator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-orchestrator
  namespace: aihypervisor
  labels:
