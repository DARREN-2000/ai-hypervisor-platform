                secretKeyRef:
                  name: aihypervisor-secrets
                  key: database-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: redis-password
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: nats-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: jwt-secret
          volumeMounts:
            - name: config
              mountPath: /etc/aihypervisor
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "echo \'\' | nc localhost 5001"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "echo \'\' | nc localhost 5001"
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: aihypervisor-config

