---
# Host Agent DaemonSet (runs on all GPU-capable nodes)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: host-agent
  namespace: aihypervisor-agents
  labels:
    app: host-agent
spec:
  selector:
    matchLabels:
      app: host-agent
  template:
    metadata:
      labels:
        app: host-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: host-agent
      nodeSelector:
        aihypervisor/gpu-node: "true"
      hostNetwork: true
      hostPID: true
      containers:
        - name: host-agent
          image: aihypervisor/host-agent:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
          ports:
            - name: metrics
              containerPort: 8081
          env:
            - name: AIHYPERVISOR_CONFIG
              value: "/etc/aihypervisor/config.yaml"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: database-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: redis-password
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: nats-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aihypervisor-secrets
                  key: jwt-secret
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/aihypervisor
            - name: libvirt-sock
              mountPath: /var/run/libvirt
            - name: sys
              mountPath: /sys
            - name: dev
              mountPath: /dev
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: aihypervisor-config
        - name: libvirt-sock
          hostPath:
            path: /var/run/libvirt
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory

---
# ServiceAccount for API Server
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-server
  namespace: aihypervisor

---
# ServiceAccount for VM Manager
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-manager
  namespace: aihypervisor

---
# ServiceAccount for GPU Orchestrator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-orchestrator
  namespace: aihypervisor

---
# ServiceAccount for Scheduler
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scheduler
  namespace: aihypervisor

---
# ServiceAccount for Task Executor
apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-executor
  namespace: aihypervisor

---
# ServiceAccount for Resource Monitor
apiVersion: v1
kind: ServiceAccount
metadata:
  name: resource-monitor
  namespace: aihypervisor

---
# ServiceAccount for Host Agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: host-agent
  namespace: aihypervisor-agents

---
# ClusterRole for API Server
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aihypervisor-api-server
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
# ClusterRoleBinding for API Server
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aihypervisor-api-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aihypervisor-api-server
subjects:
  - kind: ServiceAccount
    name: api-server
    namespace: aihypervisor

---
# ClusterRole for Host Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aihypervisor-host-agent
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding for Host Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aihypervisor-host-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aihypervisor-host-agent
subjects:
  - kind: ServiceAccount
    name: host-agent
    namespace: aihypervisor-agents

---
# HorizontalPodAutoscaler for API Server
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-server
  namespace: aihypervisor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# HorizontalPodAutoscaler for Task Executor
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-executor
  namespace: aihypervisor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-executor
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85

---
# HorizontalPodAutoscaler for Scheduler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scheduler
  namespace: aihypervisor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scheduler
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# HorizontalPodAutoscaler for GPU Orchestrator
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gpu-orchestrator
  namespace: aihypervisor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gpu-orchestrator
  minReplicas: 2
