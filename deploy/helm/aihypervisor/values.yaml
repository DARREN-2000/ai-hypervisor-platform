replicaCount: 1

image:
  repository: aihypervisor
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

config:
  postgresHost: postgres
  postgresPort: 5432
  postgresDB: aihypervisor
  redisHost: redis
  redisPort: 6379
  natsUrls: nats://nats:4222

secrets:
  postgresUser: aihypervisor
  postgresPassword: password
  redisPassword: password
  natsUser: aihypervisor
  natsPassword: password
